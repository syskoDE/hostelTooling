{{- if .Values.qdrant.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "unicorn-tooling.qdrantFullname" . }}
  labels:
    {{- include "unicorn-tooling.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  type: {{ .Values.qdrant.service.type }}
  selector:
    {{- include "unicorn-tooling.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
  ports:
    - name: http
      port: {{ .Values.qdrant.service.port }}
      targetPort: http
    - name: grpc
      port: {{ .Values.qdrant.service.grpcPort }}
      targetPort: grpc
{{- end }}
