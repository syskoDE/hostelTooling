{{- if and .Values.qdrant.enabled .Values.qdrant.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "unicorn-tooling.qdrantFullname" . }}
  labels:
    {{- include "unicorn-tooling.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
  {{- with .Values.qdrant.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
